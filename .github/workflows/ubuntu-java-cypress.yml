# Cypress + sealights-cypress-plugin against the Spring Boot app instrumented with the SeaLights CD Java agent.
#
# Prerequisites:
#   Repository secrets: SL_TOKEN, SL_LAB_ID (Settings → Secrets and variables → Actions)
#   Optional: SL_PROXY
#
# SeaLights:
#   - JVM: CD agent (javaagent) — backend coverage while the app serves /api/calculate
#   - Node: Cypress + sealights-cypress-plugin — tasks/support integration per npm docs
#
# Docs:
#   CD Java: https://docs.sealights.io/knowledgebase/setup-and-configuration/sealights-agents-and-plugins/cd-agent/cd-agent-for-java-application
#   Cypress plugin: https://www.npmjs.com/package/sealights-cypress-plugin
name: Ubuntu-Java-Cypress

on:
  workflow_dispatch:

jobs:
  cypress:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create SeaLights token file
        run: |
          echo -n "${{ secrets.SL_TOKEN }}" > sltoken.txt
          chmod 600 sltoken.txt

      - name: Verify Actions secrets are available
        env:
          SL_LAB_ID: ${{ secrets.SL_LAB_ID }}
        run: |
          if [ ! -s sltoken.txt ]; then
            echo "::error::SL_TOKEN is empty or not set."
            exit 1
          fi
          if [ -z "$SL_LAB_ID" ]; then
            echo "::error::SL_LAB_ID is empty or not set."
            exit 1
          fi

      - name: Download SeaLights CD Agent
        run: |
          curl -fsSL -o sl-cd-agent.zip "https://agents.sealights.co/sl-cd-agent/sl-cd-agent-latest.zip"
          unzip -q sl-cd-agent.zip -d sealights-cd-agent
          test -f sealights-cd-agent/sl-cd-agent.jar

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build application
        run: mvn -B clean package -DskipTests

      - name: Start calculator app (SeaLights CD javaagent)
        env:
          SL_LAB_ID: ${{ secrets.SL_LAB_ID }}
          SL_PROXY: ${{ secrets.SL_PROXY }}
        run: |
          set -e
          JAR=$(ls target/calculator-demo-*.jar | head -1)
          AGENT="${GITHUB_WORKSPACE}/sealights-cd-agent/sl-cd-agent.jar"
          TOKEN_FILE="${GITHUB_WORKSPACE}/sltoken.txt"
          JAVA_OPTS=(
            "-javaagent:${AGENT}"
            "-Dsl.tokenFile=${TOKEN_FILE}"
            "-Dsl.appName=calculator-demo"
            "-Dsl.labId=${SL_LAB_ID}"
            "-Dsl.buildname=${{ github.run_number }}"
            "-Dsl.branchname=ubuntu-cypress"
            "-Dsl.includes=com.example.*"
            "-Dsl.log.toConsole=true"
            "-Dsl.log.level=info"
            "--add-opens=java.base/jdk.internal.loader=ALL-UNNAMED"
          )
          if [ -n "$SL_PROXY" ]; then
            JAVA_OPTS+=("-Dsl.proxy=${SL_PROXY}")
          fi
          java "${JAVA_OPTS[@]}" -jar "$JAR" &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "App did not become ready in time"
          exit 1

      - name: Install Google Chrome (Cypress --browser chrome)
        run: |
          set -e
          if command -v google-chrome-stable >/dev/null 2>&1; then
            google-chrome-stable --version
            exit 0
          fi
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cypress/package-lock.json

      - name: Install Cypress dependencies
        working-directory: cypress
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Install Cypress binary
        working-directory: cypress
        run: npx cypress install

      - name: Run Cypress tests (sealights-cypress-plugin)
        working-directory: cypress
        env:
          CI: true
          CYPRESS_BASE_URL: http://127.0.0.1:8080
          CYPRESS_SL_TOKEN: ${{ secrets.SL_TOKEN }}
          CYPRESS_SL_TEST_STAGE: cypress
          CYPRESS_SL_TEST_PROJECT_ID: sample-java-cypress
          CYPRESS_SL_LAB_ID: ${{ secrets.SL_LAB_ID }}
          CYPRESS_SL_PROXY: ${{ secrets.SL_PROXY }}
          NODE_DEBUG: ''
        run: npm test

      - name: Stop app
        if: always()
        run: kill "$APP_PID" 2>/dev/null || true
